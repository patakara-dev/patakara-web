<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>まいにちパタカラ（マイク強制設定版）</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f8ff; padding: 20px; color: #333; }
        .container { background-color: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        h1 { color: #0076ff; font-size: 24px; margin-bottom: 5px; }
        .guide-box { background-color: #ffe6e6; border-left: 5px solid #ff3333; padding: 12px; border-radius: 5px; text-align: left; font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
        button { background-color: #0076ff; color: white; border: none; padding: 15px 3px; width: 100%; border-radius: 10px; font-size: 20px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .setup-btn { background-color: #ff3333; margin-bottom: 15px; } /* 赤い設定用ボタン */
        .countdown { font-size: 44px; font-weight: bold; color: #ff9900; margin: 20px 0; min-height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #fffde6; border-radius: 10px; border: 1px solid #ffe699; }
        .action-msg { font-size: 24px; color: red; font-weight: bold; }
        .result { font-size: 22px; font-weight: bold; margin-top: 20px; padding: 10px; border-radius: 5px; background-color: #eee; }
    </style>
</head>
<body>

<div class="container">
    <h1>まいにちパタカラ</h1>
    <p>【マイク設定・強制呼び出し版】</p>
    
    <div class="guide-box">
        <b>⚠️ 最初にやってね：</b><br>
        まず一番上の<b>【赤いボタン】</b>を押してください。「マイクへのアクセスを求めています」と出たら、必ず<b>「許可」</b>を押してください！
    </div>
    
    <button id="setupBtn" class="setup-btn">🔑 まずマイクをONにする！</button>
    
    <hr style="border: 1px dashed #ccc; margin: 20px 0;">
    
    <div id="countdownDisplay" class="countdown">
        <span style="font-size: 16px; color: #888;">上の赤ボタンで許可したあと、<br>下の青ボタンでスタート！</span>
    </div>
    
    <button id="startBtn" disabled>計測スタート！</button>
    
    <div id="resultOutput"></div>
</div>

<script>
let audioContext;
let analyser;
let microphoneStream;

const setupBtn = document.getElementById('setupBtn');
const startBtn = document.getElementById('startBtn');
const countdownDisplay = document.getElementById('countdownDisplay');
const resultOutput = document.getElementById('resultOutput');

// 赤ボタン：強制的にマイクの許可ポップアップを出す
setupBtn.addEventListener('click', async () => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        microphoneStream = stream; // ストリームを保存
        
        // 成功したらボタンを緑にして、計測ボタンを使えるようにする
        setupBtn.style.backgroundColor = "#00aa00";
        setupBtn.innerText = "✅ マイクの準備完了！";
        startBtn.disabled = false;
        countdownDisplay.innerHTML = `<span style="font-size: 18px; color: #00aa00;">大成功！下の「計測スタート」を<br>押せるようになりました！</span>`;
        
    } catch (err) {
        alert("「拒否」されたか、エラーが起きました。画面をリロードしてもう一度試すか、iPhoneの設定（Safari）を確認してください。");
        console.log(err);
    }
});

// 青ボタン：実際の計測
startBtn.addEventListener('click', async () => {
    resultOutput.innerHTML = "";
    startBtn.disabled = true;
    
    try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        const source = audioContext.createMediaStreamSource(microphoneStream);
        analyser.fftSize = 256;
        source.connect(analyser);
        
        let countNum = 3;
        countdownDisplay.innerHTML = `<span style="font-size:60px;">${countNum}</span>`;

        const interval = setInterval(() => {
            countNum--;
            if (countNum > 0) {
                countdownDisplay.innerHTML = `<span style="font-size:60px;">${countNum}</span>`;
            } else {
                clearInterval(interval);
                startMeasurement();
            }
        }, 1000);
        
    } catch (err) {
        alert("エラーが発生しました。");
        startBtn.disabled = false;
    }
});

function startMeasurement() {
    countdownDisplay.innerHTML = `<span class="action-msg">パパパパパ！<br>と言って！</span>`;
    
    let count = 0;
    let isSpeaking = false;
    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    
    const checkAudio = setInterval(() => {
        analyser.getByteFrequencyData(dataArray);
        let sum = 0;
        for(let i=0; i<bufferLength; i++) { sum += dataArray[i]; }
        let average = sum / bufferLength;
        
        if (average > 3) { 
            if (!isSpeaking) {
                count++;
                isSpeaking = true;
            }
        } else {
            isSpeaking = false;
        }
    }, 20);
    
    setTimeout(() => {
        clearInterval(checkAudio);
        if (microphoneStream) {
            microphoneStream.getTracks().forEach(track => track.stop());
        }
        if (audioContext) audioContext.close();
        
        countdownDisplay.innerHTML = `<span style="font-size:30px; color:#333;">終了しました！</span>`;
        startBtn.disabled = true; // 再テスト時はリロードしてもらう
        setupBtn.style.backgroundColor = "#ff3333";
        setupBtn.innerText = "🔑 まずマイクをONにする！";
        showResult(count);
    }, 1000);
}

function showResult(score) {
    resultOutput.innerHTML = `<div class="result">結果：${score} 回 / 秒<br>${score > 1 ? '🎉 壁を破りました！！' : '⚠️ まだ声を拾えていないようです'}</div>`;
}
</script>

</body>
</html>
