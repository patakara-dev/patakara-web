<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>まいにちパタカラ（指タップ連打版）</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f8ff; padding: 20px; color: #333; user-select: none; }
        .container { background-color: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        h1 { color: #0076ff; font-size: 24px; margin-bottom: 5px; }
        .subtitle { font-size: 14px; color: #666; font-weight: bold; margin-bottom: 20px; }
        
        .guide-box { background-color: #e6f2ff; border-left: 5px solid #0076ff; padding: 12px; border-radius: 5px; text-align: left; font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
        .target-text { font-weight: bold; color: #ff5500; }

        /* スタートボタン */
        #startBtn { background-color: #0076ff; color: white; border: none; padding: 15px 3px; width: 100%; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; }
        #startBtn:disabled { background-color: #ccc; }
        
        /* 巨大な連打ターゲットエリア */
        .tap-zone { margin: 20px 0; height: 180px; background-color: #fffde6; border: 3px dashed #ff9900; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; color: #ff6600; cursor: pointer; touch-action: manipulation; }
        .tap-zone:active { background-color: #ffe699; }
        
        /* カウントダウン表示 */
        .count-num { font-size: 50px; color: #ff3333; }

        .result { font-size: 22px; font-weight: bold; margin-top: 20px; padding: 15px; border-radius: 5px; }
        .success { background-color: #ddffdd; color: #008800; }
        .warning { background-color: #ffdddd; color: #cc0000; }
    </style>
</head>
<body>

<div class="container">
    <h1>まいにちパタカラ</h1>
    <div class="subtitle">【お試し・指タップ連打版】</div>
    
    <div class="guide-box">
        <b>💡 やり方：</b><br>
        ① 下の「計測スタート」を押すと3秒前読みが始まります。<br>
        ② 画面が切り替わったら、真ん中の黄色い箱の中を<b>「パ！パ！パ！」と声に出しながら、指で猛連打</b>してください！<br>
        🎯 <b>目標：1秒間に <span class="target-text">6品（回）以上</span></b>
    </div>
    
    <button id="startBtn">計測スタート！</button>
    
    <div id="tapZone" class="tap-zone" style="display: none;">
        ここの中を猛連打！！
    </div>
    
    <div id="countdownDisplay" style="margin: 20px 0; font-size: 20px; font-weight: bold;"></div>
    
    <div id="resultOutput"></div>
</div>

<script>
const startBtn = document.getElementById('startBtn');
const tapZone = document.getElementById('tapZone');
const countdownDisplay = document.getElementById('countdownDisplay');
const resultOutput = document.getElementById('resultOutput');

let score = 0;
let isMeasuring = false;

// 最初は連打ゾーンを隠しておく
tapZone.style.display = "none";

startBtn.addEventListener('click', () => {
    resultOutput.innerHTML = "";
    startBtn.disabled = true;
    score = 0;
    
    // 3・2・1 の秒読み
    let countNum = 3;
    countdownDisplay.innerHTML = `開始まであと <span class="count-num">${countNum}</span>`;

    const interval = setInterval(() => {
        countNum--;
        if (countNum > 0) {
            countdownDisplay.innerHTML = `開始まであと <span class="count-num">${countNum}</span>`;
        } else {
            clearInterval(interval);
            countdownDisplay.innerHTML = "";
            startMeasurement();
        }
    }, 1000);
});

function startMeasurement() {
    isMeasuring = true;
    tapZone.style.display = "flex"; // 連打ゾーンを表示
    tapZone.innerHTML = `スタート！<br><span style="font-size:40px; color:red;">${score} 回</span>`;
    
    // 1秒後にタイマー終了
    setTimeout(() => {
        isMeasuring = false;
        tapZone.style.display = "none"; // 連打ゾーンを隠す
        startBtn.disabled = false;
        showResult(score);
    }, 1000);
}

// タップ（クリック）された時の処理（PCでもスマホでも確実に動く）
function handleTap(e) {
    if (!isMeasuring) return;
    e.preventDefault(); // 連打時の画面ズームを防ぐおまじない
    score++;
    tapZone.innerHTML = `もっと叩いて！<br><span style="font-size:40px; color:red;">${score} 回</span>`;
}

// スマホのタッチと、パソコンのクリックの両方に対応
tapZone.addEventListener('touchstart', handleTap, { passive: false });
tapZone.addEventListener('mousedown', handleTap);

function showResult(finalScore) {
    let html = "";
    if (finalScore >= 6) {
        html = `<div class="result success">結果：${finalScore} 回 / 秒<br>🎉 目標達成！素晴らしい指の動きです！</div>`;
    } else {
        html = `<div class="result warning">結果：${finalScore} 回 / 秒<br>⚠️ 目標は6回以上（リハビリを続けましょう）</div>`;
    }
    resultOutput.innerHTML = html;
}
</script>

</body>
</html>
